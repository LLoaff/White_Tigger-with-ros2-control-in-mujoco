controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    # mit_controller:
    #   type: mit_controller/MitControllers

    mit_controller:
      type: mit_controller/MitControllers
mit_controller:  
  ros__parameters:
    joints:
    - fr_hip_joint
    - fr_thigh_joint
    - fr_calf_joint
    - fl_hip_joint
    - fl_thigh_joint
    - fl_calf_joint
    - br_hip_joint
    - br_thigh_joint
    - br_calf_joint
    - bl_hip_joint
    - bl_thigh_joint
    - bl_calf_joint


imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: imu_sensor
    frame_id: base_link